services:
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: development
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    container_name: symfony-php
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
    networks:
      - symfony-network
    depends_on:
      - mysql
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
    - ./src:/var/www/html
    - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - symfony-network
    depends_on:
      - php
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  mysql:
    image: mysql:8
    container_name: symfony-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - symfony-network
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"
  redis:
    image: redis:7-alpine
    container_name: symfony-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - symfony-network
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: symfony-redis-commander
    environment:
      REDIS_HOSTS: local:symfony-redis:6379
    ports:
      - "8081:8081"
    networks:
      - symfony-network
    depends_on:
      - redis

networks:
  symfony-network:
    driver: bridge

volumes:
  db-data:
