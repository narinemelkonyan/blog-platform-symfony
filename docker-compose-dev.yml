services:
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: development
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    container_name: symfony-php-dev
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-dev}
    volumes:
      - ./src:/var/www/html
    networks:
      - symfony-network-dev
    depends_on:
      - mysql
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx-dev
    ports:
      - "${NGINX_PORT_DEV:-8081}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - symfony-network-dev
    depends_on:
      - php
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  mysql:
    image: mysql:8
    container_name: symfony-mysql-dev
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-symfony}
      MYSQL_USER: ${DB_USER:-symfony}
      MYSQL_PASSWORD: ${DB_PASSWORD:-symfony}
    ports:
      - "${MYSQL_PORT_DEV:-3308}:3306"
    volumes:
      - db-data-dev:/var/lib/mysql
    networks:
      - symfony-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"
  redis:
    image: redis:7-alpine
    container_name: symfony-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - symfony-network-dev
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

networks:
  symfony-network-dev:
    driver: bridge

volumes:
  db-data-dev: