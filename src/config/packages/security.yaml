security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\Checkers\UserChecker
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_parameter: user_login[_token]
                csrf_token_id: user_login
                username_parameter: user_login[email]
                password_parameter: user_login[password]

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                always_remember_me: false
                name: form[remember_me]

    role_hierarchy:
        ROLE_MODERATOR: ROLE_USER
        ROLE_ADMIN: [ROLE_MODERATOR, ROLE_USER]

    access_control:
        - { path: ^/login,    roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/admin,    roles: ROLE_ADMIN }
        - { path: ^/profile,  roles: ROLE_USER }
        - { path: ^/article/new,    roles: ROLE_USER }
        - { path: ^/article/\d+$, methods: [POST], roles: ROLE_USER }
        - { path: ^/article/\d+/edit, roles: ROLE_USER }
        - { path: ^/article,    roles: PUBLIC_ACCESS }
        - { path: ^/article/draft/new,    roles: ROLE_USER }
        - { path: ^/article/draft/\d+$, methods: [POST], roles: ROLE_USER }
        - { path: ^/article/\d+/comment/new, roles: ROLE_USER }
when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
