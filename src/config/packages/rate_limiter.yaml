framework:
    rate_limiter:
        login_limiter:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'

        register_limiter:
            policy: sliding_window
            limit: 5
            interval: '1 hour'

        password_reset_limiter:
            policy: sliding_window
            limit: 3
            interval: '1 hour'

        comment_limiter:
            policy: sliding_window
            limit: 10
            interval: '15 minutes'

        api_limiter:
            policy: sliding_window
            limit: 100
            interval: '1 hour'
