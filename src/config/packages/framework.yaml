framework:
    secret: '%env(APP_SECRET)%'

    session:
        handler_id: '%env(REDIS_DSN)%'
        cookie_secure: auto
        cookie_samesite: lax
    cache:
        default_redis_provider: '%env(REDIS_DSN)%'
        pools:
            cache.rate_limiter:
                adapter: cache.adapter.redis

    rate_limiter: ~

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
